name: Preview Release

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "!**"

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.publish.outputs.sha }}
      urls: ${{ steps.publish.outputs.urls }}
      packages: ${{ steps.publish.outputs.packages }}

    steps:
      - uses: actions/checkout@v6

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Publish Preview
        id: publish
        run: pnpm exec pkg-pr-new publish --commentWithSha --bin

  preview_smoke_test:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - uses: actions/checkout@v6

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Create fixture project
        run: |
          mkdir -p .tmp/pkg-pr-new-smoke
          cp -R tests/fixtures/media .tmp/pkg-pr-new-smoke/media
          printf '{"name":"pkg-pr-new-smoke","private":true}\n' > .tmp/pkg-pr-new-smoke/package.json

      - name: Install preview package URL
        if: ${{ needs.publish.outputs.urls != '' || needs.publish.outputs.packages != '' }}
        working-directory: .tmp/pkg-pr-new-smoke
        run: pnpm add ${{ needs.publish.outputs.urls || needs.publish.outputs.packages }}

      - name: Run preview binary
        if: ${{ needs.publish.outputs.urls != '' || needs.publish.outputs.packages != '' }}
        working-directory: .tmp/pkg-pr-new-smoke
        run: pnpm exec influenca ./media --list

      - name: Skip smoke test when no publish outputs
        if: ${{ needs.publish.outputs.urls == '' && needs.publish.outputs.packages == '' }}
        run: echo "pkg-pr-new returned no install targets; skipping smoke test."
