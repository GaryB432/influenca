name: Release CLI

on:
  workflow_dispatch:
  push:
    tags:
      - cli-v*

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @influenca/cli... run build
      - run: pnpm pack --filter @influenca/cli
