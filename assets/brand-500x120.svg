<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 500 120"
  width="100%"
  height="100%"
>
  <!-- Definitions for reused gradients and visual properties -->
  <defs>
    <linearGradient id="gridStream" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3366" />
      <stop offset="50%" stop-color="#8a2be2" />
      <stop offset="100%" stop-color="#00ffff" />
    </linearGradient>

    <linearGradient id="glimmerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="50%" stop-color="white" stop-opacity="0.6" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="shimmerGradient" x1="-150%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="25%" stop-color="#ffffff" />
      <stop offset="42%" stop-color="#ff3366" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="58%" stop-color="#00ffff" />
      <stop offset="75%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ffffff" />

      <animate
        attributeName="x1"
        values="-150%; 150%; 150%"
        keyTimes="0; 0.7; 1"
        dur="4s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.42 0 0.58 1; 0 0 1 1"
      />
      <animate
        attributeName="x2"
        values="0%; 300%; 300%"
        keyTimes="0; 0.7; 1"
        dur="4s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.42 0 0.58 1; 0 0 1 1"
      />
    </linearGradient>

    <mask id="glimmerMask">
      <use href="#monogram-array" fill="white" />
    </mask>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#090a15" rx="6" />

  <!-- Kinetic Grid Monogram Icon (Abstract 'I' Array) -->
  <g id="monogram-array" transform="translate(52, 60)">
    <g>
      <animateTransform
        attributeName="transform"
        type="scale"
        values="1; 1.08; 1; 1.12; 1; 1"
        keyTimes="0; 0.14; 0.28; 0.42; 0.70; 1"
        dur="1.8s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"
      />
      <g transform="translate(-27, -52.5)">
        <!-- Column 1: Outbound Velocity -->
        <rect
          x="0"
          y="30"
          width="6"
          height="20"
          fill="url(#gridStream)"
          opacity="0.4"
        />
        <rect
          x="0"
          y="55"
          width="6"
          height="10"
          fill="url(#gridStream)"
          opacity="0.2"
        />

        <!-- Column 2: Structural Core -->
        <rect
          x="12"
          y="10"
          width="6"
          height="15"
          fill="url(#gridStream)"
          opacity="0.6"
        />
        <rect x="12" y="30" width="6" height="45" fill="url(#gridStream)" />
        <rect
          x="12"
          y="80"
          width="6"
          height="10"
          fill="url(#gridStream)"
          opacity="0.5"
        />

        <!-- Column 3: Center Data Pillar -->
        <rect x="24" y="0" width="6" height="25" fill="url(#gridStream)" />
        <rect
          x="24"
          y="30"
          width="6"
          height="30"
          fill="url(#gridStream)"
          opacity="0.8"
        />
        <rect x="24" y="65" width="6" height="40" fill="url(#gridStream)" />

        <!-- Column 4: Downstream Array -->
        <rect x="36" y="15" width="6" height="40" fill="url(#gridStream)" />
        <rect
          x="36"
          y="60"
          width="6"
          height="15"
          fill="url(#gridStream)"
          opacity="0.6"
        />

        <!-- Column 5: High-Speed Pointers -->
        <rect
          x="48"
          y="30"
          width="6"
          height="10"
          fill="url(#gridStream)"
          opacity="0.5"
        />
        <rect
          x="48"
          y="45"
          width="6"
          height="20"
          fill="url(#gridStream)"
          opacity="0.3"
        />
      </g>
    </g>
  </g>

  <!-- Typographic Layout -->
  <g id="brand-typography">
    <!-- Logotype -->
    <text
      x="110"
      y="62"
      font-family="monospace, Courier New, sans-serif"
      font-weight="900"
      font-size="38"
      fill="url(#shimmerGradient)"
      letter-spacing="6"
    >
      influenca
    </text>

    <!-- System Status Subtitle / Context Locator -->
    <text
      x="112"
      y="88"
      font-family="Arial, Helvetica, sans-serif"
      font-weight="600"
      font-size="10"
      fill="#5c6984"
      letter-spacing="3.5"
    >
      CORE // SYSTEM WORKSPACE
      <animate
        attributeName="opacity"
        values="0.45; 0.75; 0.45; 0.85; 0.45; 0.45"
        keyTimes="0; 0.14; 0.28; 0.42; 0.70; 1"
        dur="1.8s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1; 0.42 0 0.58 1"
      />
    </text>
  </g>

  <!-- Active Interface Accents -->
  <g id="ui-accents" opacity="0.7">
    <circle cx="465" cy="30" r="3" fill="#00ffff" />
    <line
      x1="445"
      y1="30"
      x2="457"
      y2="30"
      stroke="#2a3052"
      stroke-width="1.5"
    />
    <rect x="435" y="80" width="35" height="2" fill="#ff3366" opacity="0.6" />
  </g>
</svg>
